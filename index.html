<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<link href="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.css" rel="stylesheet">

<style>
body{
    margin:0;
}
#map{
    width:100%;
    height:100vh;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@5.3.0/dist/maplibre-gl.js"></script>

<script>
const map = new maplibregl.Map({
    container:'map',
    style:'https://tiles.openfreemap.org/styles/liberty',
    center:[138.61972,35.47],
    zoom:5
});

map.on('load', () => {

    const locations = [
        { lng:137.1111, lat:35.3445, name:"白川橋" },
        { lng:139.1642, lat:36.2618, name:"はねたき橋" },
        { lng:138.3711, lat:35.2812, name:"青木ヶ原" }
    ];

    locations.forEach(loc => {
        new maplibregl.Marker()
            .setLngLat([loc.lng, loc.lat])
            .setPopup(
                new maplibregl.Popup()
                    .setHTML(`<h3>${loc.name}</h3>`)
            )
            .addTo(map);
    });

});
</script>

</body>
</html>
